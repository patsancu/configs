# set default shell to zsh
set-option -g default-shell /bin/zsh

# enable ^arrow key to work
set-window-option -g xterm-keys on

# show pane status on border
set-option -g pane-border-status top
set-option -g pane-border-format " #P: #{pane_current_command} "

# mouse scroll
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
"send-keys -M" \
"if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# resize panes like vim
bind < resize-pane -L 10
bind > resize-pane -R 10
bind - resize-pane -D 10
bind + resize-pane -U 10

# split windows like vim
bind s split-window -v
bind v split-window -h

# prefix -> C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# common splits/windows
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# smart pane switching (vim-aware)
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"
bind -n C-\\ run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys 'C-\\') || tmux select-pane -l"

# swap windows
bind-key S-Left swap-window -t -1
bind-key S-Right swap-window -t +1

# extra split bindings
bind a split-window -h
bind s split-window -v

# sync panes
bind C-Y set-window-option synchronize-panes

# copy mode vi
set-window-option -g mode-keys vi

######################
### DESIGN CHANGES ###
######################

# pane borders
set -g pane-border-style bg=colour235,fg=colour238
set -g pane-active-border-style bg=colour236,fg=colour51

# status bar
set -g status-position bottom
set -g status-style bg=colour234,fg=colour137,dim
set -g status-justify left
set -g status-interval 2
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# window status
setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-bell-style fg=colour255,bg=colour1,bold

# messages
set -g message-style fg=colour232,bg=colour166,bold
set -g message-command-style fg=blue,bg=black

# mode styling
setw -g mode-style bg=colour6,fg=colour0
setw -g clock-mode-colour colour135

# behavior toggles
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# terminal
set -g default-terminal "screen-256color"

# start indexing at 1
set -g base-index 1
setw -g pane-base-index 1

# copy to clipboard (Ubuntu)
bind -T copy-mode C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
bind -T copy-mode-vi C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
